server:
  port: ${PORT:8080}

spring:
  application:
    name: alert-bridge

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  elastic:
    url: ${ELASTIC_URL:http://localhost:9200}
    username: ${ELASTIC_USERNAME:}
    password: ${ELASTIC_PASSWORD:}
    index-name: ${ELASTIC_INDEX_NAME:alert-events}
