server:
  port: ${PORT:8080}

spring:
  application:
    name: chat-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  vertex-ai:
    project-id: ${GCP_PROJECT_ID}
    location: ${GCP_LOCATION:asia-southeast1}
    model: ${GEMINI_MODEL:gemini-2.5-pro}
